<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mr. Happy Restaurants</title>
    <script>
      // Single-page-app redirect for GitHub Pages.
      // Stores the full path in sessionStorage and redirects to the root so
      // the Vite bundle can pick it up via the script in index.html.
      // split("/") on "/mr-happy-restaurants/some/page" gives
      // ["", "mr-happy-restaurants", "some", "page"]; slice(0, 2) keeps the
      // first two segments (empty string + repo name) so we redirect to
      // "/mr-happy-restaurants/" rather than the site root "/".
      var l = window.location;
      sessionStorage.setItem(
        "redirect",
        l.pathname + l.search + l.hash
      );
      l.replace(l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + l.pathname.split("/").slice(0, 2).join("/") + "/?p=1");
    </script>
  </head>
  <body></body>
</html>
