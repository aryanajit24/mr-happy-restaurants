<!doctype html>
<html lang="de">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Mr. Happy Restaurants — Döner, Burger & Pizza</title>
    <meta name="description" content="Bestelle online bei Mr. Happy Restaurants — authentischer Döner, Premium Burger, 36cm Pizzen und mehr. Schnelle Lieferung in Bremen und Schwanewede." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Lato:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      // Restore path after GitHub Pages SPA redirect via 404.html
      (function () {
        var redirect = sessionStorage.getItem("redirect");
        if (redirect) {
          sessionStorage.removeItem("redirect");
          var url = new URL(redirect, window.location.origin);
          if (url.pathname !== window.location.pathname) {
            window.history.replaceState(null, null, url.pathname + url.search + url.hash);
          }
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
